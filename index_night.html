<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوران ❤️ شريف</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                        script: ['Great Vibes', 'cursive'],
                    },
                    colors: {
                        romantic: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                            700: '#be123c',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'drift': 'drift 15s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        drift: {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)', opacity: 0 },
                            '10%': { opacity: 1 },
                            '90%': { opacity: 1 },
                            '100%': { transform: 'translate(100vw, -100vh) rotate(360deg)', opacity: 0 },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #020617; /* Night Sky Base */
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .red-glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-fade-in {
            animation: fadeIn 1s ease-in forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 4px; }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -100;
            opacity: 0.15;
            filter: brightness(0.6) hue-rotate(200deg);
        }
        
        .timeline-img {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .timeline-img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* Custom Slider Styling */
        .love-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 12px;
            background: rgba(51, 65, 85, 0.6);
            border-radius: 20px;
            outline: none;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .love-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #e5e7eb 0%, #9ca3af 100%);
            border: 3px solid #f9fafb;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* Chic Login Styles */
        .chic-login-card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .fancy-input {
            background: rgba(15, 23, 42, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        .fancy-input:focus {
            background: rgba(30, 41, 59, 0.9) !important;
            border-color: #fb7185 !important;
            box-shadow: 0 0 15px rgba(251, 113, 133, 0.4);
        }
        
        /* New Animations Additions */
        @keyframes slideDownNotif {
            0% { transform: translate(-50%, -150%); opacity: 0; }
            10% { transform: translate(-50%, 0); opacity: 1; }
            90% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -150%); opacity: 0; }
        }
        .notification-anim {
            animation: slideDownNotif 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2) drop-shadow(0 0 5px white); }
        }
        .star { animation: twinkle infinite ease-in-out; }

        @keyframes shootingStar {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; width: 0; }
            10% { opacity: 1; width: 80px; }
            20% { transform: translateX(-50vw) translateY(50vh) rotate(-45deg); opacity: 0; }
            100% { transform: translateX(-50vw) translateY(50vh) rotate(-45deg); opacity: 0; }
        }
        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,1));
            animation: shootingStar 10s linear infinite;
            filter: drop-shadow(0 0 5px white);
        }

        @keyframes popOutAndFade {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            50% { transform: scale(1.3) translateY(-25px); opacity: 1; filter: drop-shadow(0 0 10px rgba(244,63,94,0.8)); }
            100% { transform: scale(1.5) translateY(-50px); opacity: 0; }
        }
        .click-heart {
            position: fixed;
            pointer-events: none;
            animation: popOutAndFade 1s ease-out forwards;
            z-index: 99999;
            color: #f43f5e;
            font-size: 28px;
            transform-origin: center;
        }

        .glow-btn::after {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(45deg, #e11d48, #9333ea, #3b82f6, #e11d48);
            border-radius: inherit;
            z-index: -1;
            filter: blur(15px);
            animation: bg-pulse 3s linear infinite;
        }
        @keyframes bg-pulse {
            0% { filter: blur(10px); }
            50% { filter: blur(25px); }
            100% { filter: blur(10px); }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const Heart = ({ className, size = 24, fill = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
            </svg>
        );

        const Music = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" />
            </svg>
        );

        // --- Components ---
        
        // Floating Hearts Background
        function BackgroundHearts() {
            const [hearts, setHearts] = useState([]);
            
            useEffect(() => {
                const interval = setInterval(() => {
                    const id = Math.random();
                    const left = Math.random() * 100;
                    const size = Math.random() * (30 - 15) + 15;
                    const duration = Math.random() * (20 - 10) + 10;
                    
                    setHearts(prev => [...prev, { id, left, size, duration }]);
                    
                    setTimeout(() => {
                        setHearts(prev => prev.filter(h => h.id !== id));
                    }, duration * 1000);
                }, 1500);
                
                return () => clearInterval(interval);
            }, []);
            
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-[45]">
                    {hearts.map(h => (
                        <div 
                            key={h.id} 
                            className="absolute bottom-[-50px] animate-drift"
                            style={{ 
                                left: `${h.left}%`, 
                                animationDuration: `${h.duration}s` 
                            }}
                        >
                            <Heart size={h.size} fill="#fb7185" className="opacity-40" />
                        </div>
                    ))}
                </div>
            );
        }

        // Love Meter Component
        function LoveMeter() {
            const [meterValue, setMeterValue] = useState(0);
            const [showResult, setShowResult] = useState(false);
            
            const handleMeter = (e) => {
                const val = parseInt(e.target.value);
                setMeterValue(val);
                if (val >= 100) setShowResult(true);
            };

            return (
                <section className="py-24 px-6 relative overflow-hidden">
                    <div className="max-w-2xl mx-auto text-center glass-panel p-8 md:p-12 rounded-[3.5rem] border-2 border-red-100 shadow-2xl relative z-10">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-transparent via-red-200 to-transparent"></div>
                        <h2 className="text-4xl md:text-5xl font-bold mb-8 text-rose-300">مقياس حبنا ❤️</h2>
                        <div className="mb-12 text-xl md:text-2xl text-rose-400 font-bold">حرك القطة الفضية لتعرف مدى حبي لك!</div>
                        
                        <div className="relative h-20 flex items-center mb-8 px-4">
                            <input 
                                type="range" 
                                min="0" 
                                max="100" 
                                value={meterValue} 
                                onChange={handleMeter}
                                className="love-slider z-20"
                            />
                        </div>

                        {showResult && (
                            <div className="animate-fade-in bg-slate-900/50 p-6 rounded-3xl border border-rose-500/20 mb-6">
                                <h3 className="text-4xl md:text-5xl font-bold text-rose-500 mb-4 animate-pulse">حبنا لا ينتهي! ❤️♾️</h3>
                                <p className="text-xl md:text-2xl text-slate-300 font-medium">حبنا أكبر من أي رقم.. حبنا هو الدنيا بحالها يا نوران. ❤️</p>
                            </div>
                        )}
                        
                        {!showResult && (
                            <div className="text-rose-400 font-bold text-lg animate-bounce">
                                {meterValue < 30 ? "لسة يا روحي..." : meterValue < 70 ? "قربنا يا حتة مني!" : "هانت خلاص!"}
                            </div>
                        )}
                        <div className="mt-8 text-6xl opacity-20 filter grayscale drop-shadow-lg">🥈❤️</div>
                    </div>
                </section>
            );
        }

        // --- Notification Audio Synthesizer ---
        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.4);
            } catch (e) { console.log(e); }
        };

        // --- Main Component ---
        function LoveWebsite() {
            const [isLoading, setIsLoading] = useState(true);
            const [isLogged, setIsLogged] = useState(false);
            const [password, setPassword] = useState("");
            const [showLetter, setShowLetter] = useState(false);
            const [showSecret, setShowSecret] = useState(false);
            const [showFinalScene, setShowFinalScene] = useState(false);
            const [timeTogether, setTimeTogether] = useState({});
            const [isPlaying, setIsPlaying] = useState(false);
            const [activeNotification, setActiveNotification] = useState(null);
            const [clickHearts, setClickHearts] = useState([]);
            const audioRef = useRef(null);
            
            const playlist = [
                "./music.mp3",
                "file:///c:/Users/2023/Desktop/InstallTmp/WhatsApp Audio -03-16 at 6.49.03 PM.mpeg",
                "file:///c:/Users/2023/Desktop/InstallTmp/WhatsApp Audio 202at 7.57.44 PM.mpeg",
                "file:///c:/Users/2023/Desktop/InstallTmp/WhatsApp Audio 2026-02-13 at 2.38.29 PM.mp4",
                "file:///c:/Users/2023/Desktop/InstallTmp/WhatsApp Audio 2026-03-09 at 8.33.41 PM.mp4",
                "file:///c:/Users/2023/Desktop/InstallTmp/WhatsApp Audio 2026-03-20 at 6.31.59 PM.mpeg",
                "file:///c:/Users/2023/Desktop/InstallTmp/WhatsApp Audio 2026-03-19 at 8.02.38 PM.mpeg"
            ];
            const [currentSongIndex, setCurrentSongIndex] = useState(0);

            useEffect(() => {
                if (isLogged && isPlaying && audioRef.current) {
                    audioRef.current.play().catch(e => console.log(e));
                }
            }, [currentSongIndex]);
            
            const handleSongEnd = () => {
                setCurrentSongIndex((prev) => (prev + 1) % playlist.length);
            };

            // Click Effect Manager
            useEffect(() => {
                const handleClick = (e) => {
                    const id = Date.now() + Math.random();
                    setClickHearts(prev => [...prev.slice(-15), { id, x: e.clientX, y: e.clientY }]);
                    setTimeout(() => {
                        setClickHearts(prev => prev.filter(h => h.id !== id));
                    }, 1000);
                };
                window.addEventListener('click', handleClick);
                return () => window.removeEventListener('click', handleClick);
            }, []);

            const loveStartDate = new Date("2024-01-18T00:00:00");

            const loveMessagesQuotes = [
                "بحبك أوي يا حتة من قلبي 🥺❤️",
                "أنتي العوض الجميل اللي ربنا رزقني بيه 💍",
                "يا أجمل وأحن إنسانة في حياتي 😘",
                "كل لحظة معاكي بتسوى عمري كله 🌍",
                "وحشتيني حتى وأنتي معايا يا روحي 💖",
                "صوتك لوحده بيطمني يا نوران ✨",
                "يا ست البنات وتاج راسي 👑❤️",
                "ضحكتك بتنور دنيتي يا نور عيني 😍",
                "أنتي الأمان وكل دنيتي 🥺",
                "بتوحشيني في كل ثانية بتمر من غيرك 🕒❤️",
                "أنا مجنون بيكي وبكل تفاصيلك 🤪❤️",
                "أنتي الفرحة اللي دخلت حياتي فجأة 💖",
                "بحب تفاصيلك الصغيرة قبل الكبيرة ✨",
                "عيونك دي حكايتي اللي مابتخلصش 😍",
                "وجودك بيحلي أي مر في أيامي 🍯",
                "نفسي الأيام تقف وأنتي في حضني يا قلب شريف 🥺❤️",
                "أنتي سر ضحكتي ونور عيني 💌",
                "أنا كلي ملكك وإنتي كلك ليا 🔐",
                "يا وتين قلبي ودنيتي اللي مش عايز غيرها 💘",
                "كل ثانية معاكي هي عيد ليا 🎉♥️"
            ];

            useEffect(() => {
                setTimeout(() => setIsLoading(false), 4500); // loading delay
            }, []);

            useEffect(() => {
                if (isLogged && !isLoading) {
                    const notifyInt = setInterval(() => {
                        const randomMsg = loveMessagesQuotes[Math.floor(Math.random() * loveMessagesQuotes.length)];
                        setActiveNotification(randomMsg);
                        playBeep();
                        setTimeout(() => setActiveNotification(null), 4000); // hide after 4 seconds
                    }, 10000);
                    return () => clearInterval(notifyInt);
                }
            }, [isLogged, isLoading]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    const diff = now - loveStartDate;
                    const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const years = Math.floor(totalDays / 365);
                    const months = Math.floor((totalDays % 365) / 30);
                    const days = totalDays % 30;
                    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
                    const minutes = Math.floor(diff / (1000 * 60)) % 60;
                    const seconds = Math.floor(diff / 1000) % 60;
                    setTimeTogether({ years, months, days, hours, minutes, seconds });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const handleLogin = () => {
                if (password.toUpperCase() === "LOVE") {
                    setIsLogged(true);
                    setTimeout(() => {
                        if (audioRef.current) {
                            audioRef.current.play().catch(e => console.log("Audio play blocked", e));
                            setIsPlaying(true);
                        }
                        setShowLetter(true);
                    }, 500);
                } else {
                    alert("كلمة السر خطأ، حاول مرة أخرى ❤️");
                }
            };

            const toggleAudio = () => {
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            const handleVideoPlay = () => {
                if (audioRef.current && isPlaying) {
                    audioRef.current.pause();
                }
            };

            const handleVideoPause = () => {
                if (audioRef.current && isPlaying) {
                    audioRef.current.play();
                }
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-950 text-white relative overflow-hidden z-50">
                        <div className="absolute inset-0 flex justify-center items-center opacity-10">
                            <Heart size={400} fill="#f43f5e" className="animate-pulse-slow" />
                        </div>
                        <div className="relative z-10 flex flex-col items-center text-center px-4">
                            <div className="w-24 h-24 mb-6 border-4 border-rose-500 border-t-transparent rounded-full animate-spin"></div>
                            <h2 className="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-rose-400 to-red-600 font-script">جارٍ التحميل...</h2>
                            <p className="text-xl md:text-2xl text-slate-300 font-medium animate-pulse mt-4">النت بيحمل بس حبنا أسرع بكتير 😂❤️</p>
                            <p className="text-lg text-slate-400 mt-2">بنجهزلك المفاجأة يا قمر ثواني...</p>
                        </div>
                    </div>
                );
            }

            if (!isLogged) {
                return (
                    <div className="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-950">
                        <div className="absolute inset-0 bg-blue-900/10 pointer-events-none"></div>
                        {[...Array(50)].map((_, i) => (
                            <div key={i} className="star absolute bg-white rounded-full" style={{
                                width: Math.random() * 3 + 'px', 
                                height: Math.random() * 3 + 'px',
                                top: Math.random() * 100 + '%',
                                left: Math.random() * 100 + '%',
                                animationDelay: Math.random() * 3 + 's'
                            }}></div>
                        ))}
                        <video autoPlay muted loop playsInline className="video-bg">
                            <source src="./video.mp4" type="video/mp4" />
                        </video>
                        <div className="absolute inset-0 bg-gradient-to-b from-slate-950/80 via-slate-900/40 to-slate-950/90 backdrop-blur-sm"></div>

                        <div className="relative z-10 chic-login-card p-12 md:p-16 rounded-[4rem] text-center text-white max-w-md w-[90%] overflow-hidden group border-t border-l border-white/20">
                           <div className="absolute -top-20 -right-20 w-40 h-40 bg-pink-500/20 rounded-full blur-3xl group-hover:bg-pink-500/30 transition-all duration-700"></div>
                           <div className="absolute -bottom-20 -left-20 w-40 h-40 bg-indigo-500/20 rounded-full blur-3xl group-hover:bg-indigo-500/30 transition-all duration-700"></div>
                           
                            <div className="mb-10 flex justify-center scale-125">
                                <div className="bg-white/10 p-5 rounded-full animate-float shadow-[0_0_30px_rgba(251,113,133,0.4)]">
                                    <Heart className="text-rose-400" size={60} fill="#f43f5e" />
                                </div>
                            </div>
                            
                            <h1 className="text-4xl font-extrabold mb-4 font-sans tracking-tight text-white drop-shadow-2xl">نوران ❤️ شريف</h1>
                            <p className="text-slate-300 mb-12 font-medium">افتح قلبي يا أغلى ما عندي</p>
                            
                            <div className="relative mb-8">
                                <input
                                    type="password"
                                    placeholder="كلمة السر الخاصة بنا"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="fancy-input w-full p-6 pl-14 rounded-3xl text-white placeholder-slate-400 text-center text-xl outline-none shadow-inner"
                                />
                                <div className="absolute left-6 top-1/2 -translate-y-1/2 opacity-40">
                                    <Heart size={24} />
                                </div>
                            </div>
                            
                            <button 
                                onClick={handleLogin} 
                                className="w-full bg-gradient-to-r from-rose-600 to-indigo-700 text-white font-bold py-6 rounded-3xl shadow-[0_10px_40px_rgba(225,29,72,0.4)] hover:shadow-[0_15px_60px_rgba(225,29,72,0.6)] hover:scale-[1.03] transition-all duration-300 text-xl border-t border-white/20 active:scale-95"
                            >
                                دخول لعالمنا ❤️
                            </button>
                            
                            <div className="mt-8 text-white/30 text-sm font-medium tracking-widest uppercase">Forever Together</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-slate-100 relative bg-slate-950 transition-colors duration-1000 overflow-hidden">

                            <div className="text-xl leading-relaxed text-slate-300 space-y-6 font-medium">
                                <p>بصي يا حبيبتي، إحنا أهه عارفين بعض من زمان، ويوم ما دخلتي حياتي كانت فجأة ومش مترتبة، جت صدفة بس وحياة ربنا أحسن صدفة وأجمل حاجة حصلت في حياتي عشان عرفتني على أجمل بنت وأحن وأطيب قلب يا نور عيني 🥹♥️♥️</p>
                                <p>عايز أقولك إني من يوم ما عرفتك وأنتي بقيتي كل حاجة ليا، بقيتي بنتي وحبيبتي وصاحبتي وكل دنيتي. أنتي بقيتي الحياة اللي عايش عشانها، أنا بحبك أوي، بحب حنيتك وكلامك ليا، بحب ضحكتك وبحب غيرتك عليا، بحبك كلك على بعضك كده. أنتي الحاجة الوحيدة اللي طلعت بيها م الدنيا دي، أنتي الأكسجين اللي بتنفسه 🥺♥️</p>
                                <p>الأيام بتجري وأنتي معايا يا عمري، وإن شاء الله يا حياتي هنفضل مع بعض طول العمر ونبني حياتنا سوا 🏘🌎♥️😘</p>
                                <p>لسه كام شهر وهنتم سنتين مع بعض يا روحي 👀♥️</p>
                                <p>ربنا يخليكي ليا يا حتة مني ويديمك ليا يا نور عيني وما يحرمنيش منك أبداً يا حياتي 🌎🏘😘</p>
                            </div>
                            <div className="mt-12 flex justify-center pb-4">
                                <button onClick={onClose} className="bg-gradient-to-r from-rose-500 to-indigo-600 text-white px-14 py-4 rounded-full shadow-[0_0_30px_rgba(244,63,94,0.5)] hover:scale-110 transition-transform font-bold text-xl border border-white/20">بختمها بحبك ❤️</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function MemoryGame() {
            const initialCards = ['🌹', '🌹', '💍', '💍', '💖', '💖', '👫', '👫', '🌍', '🌍', '💌', '💌'];
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [won, setWon] = useState(false);

            useEffect(() => {
                const shuffled = [...initialCards].sort(() => Math.random() - 0.5).map((emoji, index) => ({ id: index, emoji }));
                setCards(shuffled);
            }, []);

            useEffect(() => {
                if (solved.length > 0 && solved.length === initialCards.length) {
                    setTimeout(() => setWon(true), 1000);
                }
            }, [solved]);

            const handleClick = (index) => {
                if (flipped.includes(index) || solved.includes(index) || flipped.length >= 2) return;
                
                const newFlipped = [...flipped, index];
                setFlipped(newFlipped);
                
                if (newFlipped.length === 2) {
                    const [first, second] = newFlipped;
                    if (cards[first].emoji === cards[second].emoji) {
                        setSolved([...solved, first, second]);
                        setFlipped([]);
                    } else {
                        setTimeout(() => setFlipped([]), 800);
                    }
                }
            };

            return (
                <section className="py-24 relative z-10 bg-slate-900/50 backdrop-blur-sm border-y border-slate-800/50">
                    <div className="max-w-4xl mx-auto px-6 text-center">
                        <h2 className="text-4xl md:text-5xl font-bold mb-6 text-rose-300 drop-shadow-md">لعبة قلوبنا المتباعدة 🧩</h2>
                        <p className="text-slate-300 mb-12 text-xl font-medium">وصل كل قلبين ببعض عشان تشوف مفاجأتك يا روحي ❤️</p>
                        
                        <div className="grid grid-cols-3 md:grid-cols-4 gap-4 md:gap-6 justify-center max-w-2xl mx-auto">
                            {cards.map((card, i) => {
                                const isFlipped = flipped.includes(i) || solved.includes(i);
                                return (
                                    <div 
                                        key={i} 
                                        onClick={() => handleClick(i)}
                                        className={`aspect-square w-full rounded-2xl flex items-center justify-center text-4xl md:text-6xl cursor-pointer transition-all duration-300 transform border-2 ${isFlipped ? 'bg-slate-900 border-rose-500 shadow-[0_0_20px_rgba(244,63,94,0.3)] scale-[1.02]' : 'bg-slate-800/80 border-slate-700 hover:scale-105 shadow-xl hover:border-slate-500'}`}
                                    >
                                        <span className={`transition-all duration-300 drop-shadow-md ${isFlipped ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-50 -rotate-12'}`}>
                                            {card.emoji}
                                        </span>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {won && (
                            <div className="fixed inset-0 z-[130] flex items-center justify-center bg-black/90 backdrop-blur-md p-4 animate-fade-in">
                                <div className="bg-slate-900/90 border border-rose-500/50 p-10 md:p-16 rounded-[3rem] shadow-[0_0_60px_rgba(225,29,72,0.5)] text-center max-w-2xl transform scale-110">
                                    <div className="text-7xl mb-6 animate-bounce">🎉❤️</div>
                                    <h3 className="text-4xl md:text-5xl font-bold text-rose-400 mb-8 font-script">اكتمل النصاب!</h3>
                                    <p className="text-xl md:text-2xl text-slate-200 leading-relaxed font-medium mb-12">
                                        تصدقي إن قلوبنا اتخلقت عشان تكمل بعض كده بالظبط؟ 😍 زي ما جمعتي القلوب دي، ربنا يجمعني بيكي دايماً وفي أسرع وقت يا نور عيني 💍💖
                                    </p>
                                    <button onClick={() => {
                                      setWon(false);
                                      setSolved([]);
                                      setCards([...initialCards].sort(() => Math.random() - 0.5).map((emoji, index) => ({ id: index, emoji })));
                                    }} className="bg-gradient-to-r from-rose-600 to-rose-800 text-white px-12 py-4 rounded-full text-xl font-bold shadow-[0_0_30px_rgba(225,29,72,0.6)] hover:scale-110 transition-transform w-full md:w-auto border border-rose-400/30">
                                        كملي يا حبيبتي ❤️
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </section>
            );
        }

        function TimeBox({ label, value }) {
            return (
                <div className="bg-slate-900/60 backdrop-blur-md border border-slate-700 text-rose-400 w-24 sm:w-28 md:w-36 p-4 sm:p-6 md:p-8 rounded-[1.5rem] md:rounded-[2rem] shadow-[0_10px_30px_rgba(0,0,0,0.5)] transform hover:-translate-y-3 transition-transform hover:border-rose-500/50 hover:shadow-[0_0_20px_rgba(244,63,94,0.3)]">
                    <div className="text-2xl sm:text-3xl md:text-4xl font-bold mb-1 drop-shadow-sm">{value || 0}</div>
                    <div className="text-xs md:text-sm font-bold uppercase tracking-widest text-slate-400">{label}</div>
                </div>
            );
        }

        function FinalSceneComponent({ onClose }) {
            const [step, setStep] = useState(0);
            useEffect(() => {
                const timings = [500, 3000, 8000, 13000, 18000, 23000, 28000];
                const timeouts = timings.map((t, i) => setTimeout(() => setStep(i + 1), t));
                return () => timeouts.forEach(clearTimeout);
            }, []);

            return (
                <div className="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center text-center p-6 md:p-8 overflow-y-auto font-sans">
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom,_var(--tw-gradient-stops))] from-indigo-900/20 via-slate-950 to-black z-0 pointer-events-none"></div>
                    {[...Array(80)].map((_, i) => (
                        <div key={`fs-star-${i}`} className="star absolute bg-white/80 rounded-full z-0 pointer-events-none" style={{
                            width: Math.random() * 3 + 'px', height: Math.random() * 3 + 'px',
                            top: Math.random() * 100 + '%', left: Math.random() * 100 + '%',
                            animationDelay: Math.random() * 3 + 's'
                        }}></div>
                    ))}
                    {[...Array(3)].map((_, i) => (
                         <div key={`fs-shooting${i}`} className="shooting-star z-0 pointer-events-none" style={{
                             top: Math.random() * 30 + 'vh',
                             left: Math.random() * 40 + 60 + 'vw',
                             animationDelay: Math.random() * 6 + 's',
                             animationDuration: '6s'
                         }}></div>
                    ))}
                    
                    {/* Glowing Moon */}
                    <div className="absolute top-10 right-10 md:top-20 md:right-20 w-24 h-24 md:w-32 md:h-32 rounded-full bg-yellow-100/90 shadow-[0_0_80px_rgba(253,224,71,0.6)] z-0 pointer-events-none opacity-80 animate-pulse-slow"></div>

                    <button onClick={onClose} className="absolute top-6 md:top-8 right-6 md:right-8 text-slate-400 hover:text-white hover:rotate-90 transition-all duration-300 text-4xl md:text-5xl font-bold z-50">×</button>
                    
                    <div className="max-w-2xl w-full text-white relative z-10" dir="rtl">
                        {step === 1 && <h2 className="text-6xl md:text-8xl font-bold text-rose-500 animate-[pulse_2s_infinite] drop-shadow-[0_0_40px_rgba(225,29,72,0.8)]">إلى نوران.. ❤️</h2>}
                        {step >= 2 && step < 6 && (
                            <div className="space-y-8 md:space-y-12 animate-fade-in py-10">
                                {step >= 2 && (
                                    <div className="bg-slate-900/40 p-8 rounded-[2rem] backdrop-blur-md border border-slate-700/50 shadow-[0_0_50px_rgba(225,29,72,0.1)]">
                                        <p className="text-2xl md:text-4xl font-bold leading-relaxed shadow-red-900/40 drop-shadow-lg mb-6 text-rose-100">نوران.. أنتي مش بس حبيبتي، أنتي كل دنيتي وأماني.</p>
                                        <p className="text-xl md:text-2xl text-rose-300">كل ثانية معاكي هي عمر جديد بعيشه بسعادة.</p>
                                    </div>
                                )}
                                {step >= 3 && (
                                    <div className="animate-fade-in delay-500">
                                        <p className="text-2xl md:text-3xl font-bold text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.5)]">وعد عليا إني هفضل ليكي نبض مبيقفش، وحب مبيخلصش.</p>
                                    </div>
                                )}
                                {step >= 4 && (
                                    <p className="text-4xl md:text-6xl font-script text-rose-400 mt-10 animate-bounce drop-shadow-[0_0_15px_rgba(251,113,133,0.5)]">بحبك فوق ما تتخيلي.. ❤️</p>
                                )}
                                {step >= 5 && (
                                    <p className="text-xl text-yellow-300 font-bold mt-6 tracking-wide">ربنا يخليكي ليا وما يحرمنيش منك أبداً يا كل دنيتي. 🏘🌎♥️</p>
                                )}
                            </div>
                        )}
                        {step >= 6 && (
                            <div className="animate-fade-in flex flex-col items-center">
                                <div className="mb-10 text-rose-500 bg-slate-900/50 p-6 rounded-full animate-float shadow-[0_0_40px_rgba(225,29,72,0.4)] border border-rose-500/20">
                                    <Heart size={80} fill="currentColor" className="animate-pulse" />
                                </div>
                                <h1 className="text-6xl md:text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-400 via-pink-500 to-red-500 mb-8 md:mb-12 font-script drop-shadow-2xl hero-title">Nouran ❤️ Sherif</h1>
                                <p className="text-3xl md:text-4xl font-bold mb-4 text-slate-100">حبنا أقوى من كل شيء..</p>
                                <p className="text-4xl md:text-5xl font-bold text-rose-400 animate-pulse">إلى ما لا نهاية ♾️</p>
                                {step >= 7 && <p className="text-xl md:text-2xl text-slate-400 mt-10 font-serif italic border-t border-slate-800/80 pt-6">For the rest of our life.</p>}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoveWebsite />);
    </script>
</body>

</html>
